[build]
  command = "npm run build"
  publish = "dist"

# Identity + Git Gateway power /admin (Decap). Enable in Netlify:
# Project configuration → Identity (Invite only) → Services → Git Gateway

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
